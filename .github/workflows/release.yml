name: Release CLI Clients

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: federated-realms-macos-arm64
            ext: ""
          - target: bun-darwin-x64
            os: macos-latest
            artifact: federated-realms-macos-x64
            ext: ""
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: federated-realms-linux-x64
            ext: ""
          - target: bun-windows-x64
            os: ubuntu-latest
            artifact: federated-realms-windows-x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile CLI binary
        run: |
          bun build apps/cli-client/src/index.tsx \
            --compile \
            --target ${{ matrix.target }} \
            --outfile federated-realms${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: federated-realms${{ matrix.ext }}

  package-deb:
    needs: build-cli
    runs-on: ubuntu-latest
    name: Package .deb

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: federated-realms-linux-x64

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PKG_DIR=federated-realms_${VERSION}_amd64

          mkdir -p ${PKG_DIR}/DEBIAN
          mkdir -p ${PKG_DIR}/usr/local/bin

          cp federated-realms ${PKG_DIR}/usr/local/bin/federated-realms
          chmod 755 ${PKG_DIR}/usr/local/bin/federated-realms

          cat > ${PKG_DIR}/DEBIAN/control << EOF
          Package: federated-realms
          Version: ${VERSION}
          Section: games
          Priority: optional
          Architecture: amd64
          Maintainer: Federated Realms <noreply@cacheblasters.com>
          Description: Federated MUD client built on the AT Protocol
           A terminal-based MUD client for Federated Realms dungeon servers.
           Connect to any Federated Realms server and explore, fight, and
           adventure with other players in a federated game world.
          EOF

          dpkg-deb --build ${PKG_DIR}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: federated-realms-deb
          path: "*.deb"

  release:
    needs: [build-cli, package-deb]
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release

          # macOS ARM64 (Unsigned)
          cp artifacts/federated-realms-macos-arm64/federated-realms release/federated-realms-macos-arm64
          chmod 755 release/federated-realms-macos-arm64

          # macOS x64
          cp artifacts/federated-realms-macos-x64/federated-realms release/federated-realms-macos-x64
          chmod 755 release/federated-realms-macos-x64

          # Linux x64
          cp artifacts/federated-realms-linux-x64/federated-realms release/federated-realms-linux-x64
          chmod 755 release/federated-realms-linux-x64

          # Windows
          cp artifacts/federated-realms-windows-x64/federated-realms.exe release/federated-realms-windows-x64.exe

          # .deb
          cp artifacts/federated-realms-deb/*.deb release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Federated Realms ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: release/*
          body: |
            ## Federated Realms CLI Client

            ### Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `federated-realms-macos-arm64` |
            | macOS (Intel) | `federated-realms-macos-x64` |
            | Linux (x64) | `federated-realms-linux-x64` |
            | Linux (x64 .deb) | `federated-realms_*_amd64.deb` |
            | Windows (x64) | `federated-realms-windows-x64.exe` |

            ### Quick Start

            ```bash
            # macOS / Linux
            # On MacOS, you will need to run `xattr -d com.apple.quarantine federated-realms-macos-arm64` depending on your chip as it is not signed.
            chmod +x federated-realms-*
            ./federated-realms-macos-arm64 --host your-server.com --port 3000 --name YourName

            # Windows
            federated-realms-windows-x64.exe --host your-server.com --port 3000 --name YourName

            # Linux .deb
            sudo dpkg -i federated-realms_*_amd64.deb
            federated-realms --host your-server.com --port 3000 --name YourName
            ```

            ### Options

            - `--host` - Server hostname (default: localhost)
            - `--port` - Server port (default: 3333)
            - `--name` - Character name
            - `--class` - Character class (default: warrior)
            - `--race` - Character race (default: human)
